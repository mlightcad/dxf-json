<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DXF JSON Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/jsoneditor@10.2.0/dist/jsoneditor.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/jsoneditor@10.2.0/dist/jsoneditor.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      font-family:
        Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      background: #f7f8fb;
      color: #17202a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
    }

    main {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid #d8dde8;
      background: #ffffff;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
      font-weight: 700;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    input[type="file"] {
      max-width: 280px;
      font: inherit;
    }

    .status {
      min-height: 24px;
      padding: 0 20px;
      border-bottom: 1px solid #d8dde8;
      background: #ffffff;
      color: #485568;
      font-size: 14px;
      line-height: 24px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status.error {
      color: #b42318;
    }

    #jsonEditor {
      min-height: 0;
    }

    #jsonEditor[hidden] {
      display: none;
    }

    .jsoneditor {
      border: 0;
    }

    @media (max-width: 640px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .controls,
      input[type="file"] {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>DXF JSON Viewer</h1>
      <div class="controls">
        <input type="file" id="fileInput" accept=".dxf">
      </div>
    </header>
    <div id="status" class="status">Select a DXF file to inspect its parsed JSON.</div>
    <div id="jsonEditor" hidden></div>
  </main>

  <script type="module" src="./dxf_json_viewer.ts"></script>
</body>
</html>
